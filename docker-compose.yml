services:
  voice-bot:
    build: .
    ports:
      - "8080:8080"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    env_file:
      - .env
    environment:
      # Override Windows paths from .env with container-local paths
      HF_HOME: /app/.cache/huggingface
      TORCH_HOME: /app/.cache/torch
    volumes:
      # Mount source code directly — no rebuild needed after code changes
      - ./app:/app/app
      - ./static:/app/static
      - ./knowledge_base:/app/knowledge_base
      - ./data:/app/data
      # Persist downloaded Whisper + HuggingFace models across restarts
      - model-cache:/app/.cache
      # Persist ChromaDB vector store
      - chroma-data:/app/chroma_data

volumes:
  model-cache:
  chroma-data:
