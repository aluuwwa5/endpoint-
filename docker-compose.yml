services:
  voice-bot:
    build: .
    ports:
      - "8080:8080"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    env_file:
      - .env
    environment:
      HF_HOME: /app/.cache/huggingface
      TORCH_HOME: /app/.cache/torch
      DATABASE_URL: postgresql://voicebot:voicebot@db:5432/voicebot
    volumes:
      - ./app:/app/app
      - ./static:/app/static
      - ./knowledge_base:/app/knowledge_base
      - ./data:/app/data
      - model-cache:/app/.cache
      - chroma-data:/app/chroma_data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: voicebot
      POSTGRES_USER: voicebot
      POSTGRES_PASSWORD: voicebot
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicebot -d voicebot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  model-cache:
  chroma-data:
  pg-data:
