<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Assistant · KBTU</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 520px;
            min-height: 680px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 1.1rem 1.25rem;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 0.65rem; }

        .bot-avatar {
            width: 36px; height: 36px;
            background: #1e3a8a; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1rem;
        }

        .header-title { font-size: 0.95rem; font-weight: 600; color: #0f172a; }
        .header-sub   { font-size: 0.72rem; color: #94a3b8; margin-top: 1px; }

        .chat-link {
            display: flex; align-items: center; gap: 0.35rem;
            padding: 0.35rem 0.75rem;
            border-radius: 20px; border: 1.5px solid #e2e8f0;
            background: transparent; color: #64748b;
            font-size: 0.75rem; cursor: pointer;
            text-decoration: none; transition: all 0.2s;
        }
        .chat-link:hover { border-color: #1e3a8a; color: #1e3a8a; }

        /* Voice selector */
        .voice-selector {
            display: flex; gap: 0.5rem;
            padding: 1rem 1.25rem 0;
            justify-content: center;
        }

        .voice-opt {
            flex: 1; padding: 0.6rem;
            border: 1.5px solid #e2e8f0; border-radius: 12px;
            background: #fff; cursor: pointer;
            transition: all 0.2s; text-align: center;
            font-family: inherit;
        }

        .voice-opt.active {
            border-color: #1e3a8a;
            background: #eff6ff;
        }

        .voice-opt .opt-name { font-size: 0.82rem; font-weight: 600; color: #1e293b; margin-top: 0.25rem; }
        .voice-opt .opt-role { font-size: 0.7rem; color: #94a3b8; }

        /* Mic area */
        .mic-area {
            display: flex; flex-direction: column;
            align-items: center; padding: 2rem 1.25rem 1.5rem;
            flex-shrink: 0;
        }

        .mic-ring {
            position: relative;
            width: 120px; height: 120px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.25rem;
        }

        .mic-ring::before {
            content: '';
            position: absolute; inset: -8px;
            border-radius: 50%;
            border: 2px solid #e2e8f0;
            transition: all 0.3s;
            pointer-events: none;
        }

        .mic-ring.recording::before {
            border-color: #ef4444;
            animation: ripple 1.4s ease-in-out infinite;
        }

        @keyframes ripple {
            0%   { transform: scale(1);   opacity: 1; }
            100% { transform: scale(1.18); opacity: 0; }
        }

        .mic-btn {
            width: 120px; height: 120px;
            border-radius: 50%; border: none;
            background: #1e3a8a;
            color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(30,58,138,0.30);
        }

        .mic-btn:hover:not(:disabled) {
            background: #1e40af;
            box-shadow: 0 6px 28px rgba(30,58,138,0.40);
        }

        .mic-btn.recording {
            background: #dc2626;
            box-shadow: 0 4px 20px rgba(220,38,38,0.35);
        }

        .mic-btn.processing {
            background: #64748b;
            cursor: wait;
            box-shadow: none;
        }

        .mic-btn:disabled { opacity: 0.55; cursor: wait; }

        .mic-btn svg { width: 42px; height: 42px; pointer-events: none; }

        .status-text {
            font-size: 0.88rem; color: #64748b; text-align: center;
            min-height: 1.4em;
        }

        .status-text.recording { color: #dc2626; font-weight: 500; }
        .status-text.processing { color: #64748b; }
        .status-text.playing { color: #16a34a; }

        .timer {
            font-size: 0.78rem; color: #dc2626;
            font-variant-numeric: tabular-nums;
            margin-top: 0.3rem; min-height: 1.2em;
        }

        /* Visualizer */
        .visualizer {
            width: 100%; height: 56px;
            display: none; margin: 0.5rem 0;
        }
        .visualizer.active { display: block; }
        #waveCanvas { width: 100%; height: 100%; border-radius: 8px; }

        /* Chat log */
        .chat-log {
            flex: 1;
            overflow-y: auto;
            margin: 0 1.1rem;
            padding: 0.75rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            border-top: 1px solid #f1f5f9;
        }

        .chat-log::-webkit-scrollbar { width: 4px; }
        .chat-log::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

        .msg-row { display: flex; align-items: flex-end; gap: 0.5rem; }
        .msg-row.user { flex-direction: row-reverse; }

        .msg-icon {
            width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; flex-shrink: 0;
        }
        .msg-row.bot  .msg-icon { background: #eff6ff; }
        .msg-row.user .msg-icon { background: #f1f5f9; }

        .bubble {
            max-width: 76%; padding: 0.6rem 0.85rem;
            border-radius: 14px; font-size: 0.86rem;
            line-height: 1.5; word-break: break-word;
        }
        .msg-row.bot  .bubble { background: #f8fafc; border: 1px solid #f1f5f9; border-bottom-left-radius: 4px; color: #1e293b; }
        .msg-row.user .bubble { background: #1e3a8a; color: #fff; border-bottom-right-radius: 4px; }

        /* Footer */
        .footer {
            text-align: center; padding: 0.65rem;
            font-size: 0.65rem; color: #cbd5e1;
            letter-spacing: 0.05em; text-transform: uppercase;
            border-top: 1px solid #f1f5f9; flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="card">

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="bot-avatar">🤖</div>
            <div>
                <div class="header-title">AI Assistant</div>
                <div class="header-sub">Psychological support · KBTU</div>
            </div>
        </div>
        <a class="chat-link" id="chatLink" href="/chat">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            Chat
        </a>
    </div>

    <!-- Voice selector -->
    <div class="voice-selector">
        <button class="voice-opt active" data-gender="female" onclick="selectVoice('female')">
            <div style="font-size:1.3rem">👩</div>
            <div class="opt-name">Aigul</div>
            <div class="opt-role">Female voice</div>
        </button>
        <button class="voice-opt" data-gender="male" onclick="selectVoice('male')">
            <div style="font-size:1.3rem">👨</div>
            <div class="opt-name">Daulet</div>
            <div class="opt-role">Male voice</div>
        </button>
    </div>

    <!-- Mic -->
    <div class="mic-area">
        <div class="mic-ring" id="micRing">
            <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
                <!-- Mic icon -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </button>
        </div>

        <div class="visualizer" id="visualizer">
            <canvas id="waveCanvas"></canvas>
        </div>
        <div class="timer" id="timer"></div>
        <div class="status-text" id="statusText">Press to speak</div>
    </div>

    <!-- Chat log -->
    <div class="chat-log" id="chatLog" style="display:none; max-height:280px;"></div>

    <div class="footer">Confidential &amp; AI Powered Support</div>
</div>

<script>
    const SAMPLE_RATE = 16000;
    const SESSION_ID  = (crypto.randomUUID || (() => Math.random().toString(36).slice(2) + Date.now().toString(36)))();
    const AUTH_TOKEN  = new URLSearchParams(location.search).get('token')
                     || localStorage.getItem('access_token') || '';

    document.getElementById('chatLink').href = '/chat' + (AUTH_TOKEN ? '?token=' + encodeURIComponent(AUTH_TOKEN) : '');

    let gender = 'female';
    let mediaStream = null, audioContext = null, processor = null;
    let analyser = null, animFrameId = null;
    let isRecording = false, isBusy = false;
    let audioChunks = [], timerInterval = null, timerSec = 0;

    const micBtn     = document.getElementById('micBtn');
    const micRing    = document.getElementById('micRing');
    const statusText = document.getElementById('statusText');
    const timerEl    = document.getElementById('timer');
    const visualizer = document.getElementById('visualizer');
    const waveCanvas = document.getElementById('waveCanvas');
    const canvasCtx  = waveCanvas.getContext('2d');
    const chatLog    = document.getElementById('chatLog');

    function selectVoice(g) {
        gender = g;
        document.querySelectorAll('[data-gender]').forEach(el =>
            el.classList.toggle('active', el.dataset.gender === g));
    }

    function setStatus(text, cls = '') {
        statusText.textContent = text;
        statusText.className = 'status-text ' + cls;
    }

    function startTimer() {
        timerSec = 0; timerEl.textContent = '0:00';
        timerInterval = setInterval(() => {
            timerSec++;
            timerEl.textContent = Math.floor(timerSec / 60) + ':' + String(timerSec % 60).padStart(2,'0');
        }, 1000);
    }

    function stopTimer() { clearInterval(timerInterval); timerEl.textContent = ''; }

    function startVisualizer(source) {
        analyser = audioContext.createAnalyser(); analyser.fftSize = 256;
        source.connect(analyser);
        visualizer.classList.add('active');
        waveCanvas.width  = waveCanvas.offsetWidth  * devicePixelRatio;
        waveCanvas.height = waveCanvas.offsetHeight * devicePixelRatio;
        const buf = new Uint8Array(analyser.frequencyBinCount);
        const W = waveCanvas.width, H = waveCanvas.height;
        const N = 48, bw = W / N - 2, step = Math.floor(buf.length / N);
        (function draw() {
            animFrameId = requestAnimationFrame(draw);
            analyser.getByteFrequencyData(buf);
            canvasCtx.clearRect(0, 0, W, H);
            for (let i = 0; i < N; i++) {
                const v = buf[i * step] / 255;
                const bh = Math.max(3, v * H * 0.85);
                const x = i * (bw + 2), y = (H - bh) / 2;
                canvasCtx.fillStyle = `rgba(30,58,138,${0.25 + v * 0.7})`;
                canvasCtx.beginPath();
                canvasCtx.roundRect(x, y, bw, bh, 2);
                canvasCtx.fill();
            }
        })();
    }

    function stopVisualizer() {
        cancelAnimationFrame(animFrameId);
        visualizer.classList.remove('active');
        analyser = null;
    }

    function addChatMsg(role, text) {
        chatLog.style.display = 'flex';
        chatLog.style.flexDirection = 'column';
        const row = document.createElement('div');
        row.className = `msg-row ${role}`;
        const icon = role === 'user' ? '🧑' : '🤖';
        row.innerHTML = `
            <div class="msg-icon">${icon}</div>
            <div class="bubble">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>`;
        chatLog.appendChild(row);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    async function toggleRecording() {
        if (isBusy && !isRecording) return;
        if (isRecording) await stopAndSend();
        else await startRecording();
    }

    async function startRecording() {
        // Check browser support
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            setStatus('Microphone not supported in this browser');
            return;
        }
        try {
            setStatus('Connecting microphone…');
            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true }
            });
            audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
            const source = audioContext.createMediaStreamSource(mediaStream);
            processor = audioContext.createScriptProcessor(4096, 1, 1);
            audioChunks = [];

            processor.onaudioprocess = (e) => {
                if (!isRecording) return;
                const f32 = e.inputBuffer.getChannelData(0);
                const i16 = new Int16Array(f32.length);
                for (let i = 0; i < f32.length; i++)
                    i16[i] = Math.max(-32768, Math.min(32767, Math.round(f32[i] * 32768)));
                audioChunks.push(i16);
            };

            source.connect(processor);
            processor.connect(audioContext.destination);
            startVisualizer(source);

            isRecording = true; isBusy = true;
            micBtn.classList.add('recording');
            micRing.classList.add('recording');
            setStatus('Listening… press to stop', 'recording');
            startTimer();

        } catch (err) {
            setStatus('Microphone error: ' + err.message);
        }
    }

    async function stopAndSend() {
        isRecording = false;
        stopTimer(); stopVisualizer();
        processor?.disconnect(); processor = null;
        audioContext?.close();   audioContext = null;
        mediaStream?.getTracks().forEach(t => t.stop()); mediaStream = null;

        micBtn.classList.remove('recording');
        micRing.classList.remove('recording');

        if (!audioChunks.length) {
            setStatus('No audio captured'); isBusy = false; return;
        }

        const total = audioChunks.reduce((s,c) => s + c.length, 0);
        const merged = new Int16Array(total);
        let off = 0;
        for (const c of audioChunks) { merged.set(c, off); off += c.length; }
        audioChunks = [];

        micBtn.classList.add('processing');
        micBtn.disabled = true;
        setStatus('Processing…', 'processing');

        try {
            const ws = new WebSocket(`ws://${location.host}/ws/voice`);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'config', gender, session_id: SESSION_ID, token: AUTH_TOKEN }));
                ws.send(merged.buffer);
                ws.send(JSON.stringify({ type: 'end' }));
            };

            ws.onmessage = async (event) => {
                if (typeof event.data === 'string') {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'transcription') {
                        if (msg.text_in)  addChatMsg('user', msg.text_in);
                        if (msg.text_out) addChatMsg('bot', msg.text_out);
                        setStatus('Playing response…', 'playing');
                    }
                } else {
                    await playPCM(event.data);
                    setStatus('Press to speak');
                }
            };

            ws.onerror  = () => { setStatus('Connection error'); resetMic(); };
            ws.onclose  = () => resetMic();

        } catch (err) {
            setStatus('Error: ' + err.message);
            resetMic();
        }
    }

    function resetMic() {
        isBusy = false;
        micBtn.classList.remove('recording', 'processing');
        micBtn.disabled = false;
    }

    async function playPCM(data) {
        const i16 = new Int16Array(data);
        const f32 = new Float32Array(i16.length);
        for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
        const ctx = new AudioContext({ sampleRate: SAMPLE_RATE });
        const buf = ctx.createBuffer(1, f32.length, SAMPLE_RATE);
        buf.getChannelData(0).set(f32);
        const src = ctx.createBufferSource();
        src.buffer = buf; src.connect(ctx.destination); src.start();
        return new Promise(res => { src.onended = () => { ctx.close(); res(); }; });
    }
</script>
</body>
</html>
