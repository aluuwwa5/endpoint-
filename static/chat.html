<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant · KBTU</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f8;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card */
        .card {
            width: 520px;
            height: 760px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 1.1rem 1.25rem;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.65rem;
        }

        .bot-avatar {
            width: 36px;
            height: 36px;
            background: #1e3a8a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1rem;
        }

        .header-title { font-size: 0.95rem; font-weight: 600; color: #0f172a; }
        .header-sub   { font-size: 0.72rem; color: #94a3b8; margin-top: 1px; }

        .header-actions { display: flex; align-items: center; gap: 0.6rem; }

        .voice-btn {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            border: 1.5px solid #e2e8f0;
            background: transparent;
            color: #64748b;
            font-size: 0.75rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        .voice-btn:hover {
            border-color: #1e3a8a;
            color: #1e3a8a;
        }

        .close-btn {
            width: 28px; height: 28px;
            border: none; background: #f1f5f9;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8; font-size: 0.9rem; transition: all 0.15s;
        }
        .close-btn:hover { background: #e2e8f0; color: #475569; }
        .clear-btn {
            width: 28px; height: 28px;
            border: none; background: #f1f5f9;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; transition: all 0.15s;
        }
        .clear-btn:hover { background: #fee2e2; }

        /* Messages */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem 1.1rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

        /* Welcome */
        .welcome {
            text-align: center;
            margin: auto;
            padding: 1rem;
        }
        .welcome-icon {
            width: 52px; height: 52px;
            background: #eff6ff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 0.85rem;
        }
        .welcome h3 { font-size: 1rem; font-weight: 600; color: #0f172a; margin-bottom: 0.35rem; }
        .welcome p  { font-size: 0.82rem; color: #94a3b8; line-height: 1.5; }

        .suggestions {
            display: flex; flex-wrap: wrap;
            gap: 0.45rem; justify-content: center;
            margin-top: 1rem;
        }

        .suggestion {
            padding: 0.4rem 0.85rem;
            border-radius: 20px;
            border: 1.5px solid #e2e8f0;
            background: #fff;
            color: #475569;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.18s;
            font-family: inherit;
        }
        .suggestion:hover {
            border-color: #1e3a8a;
            color: #1e3a8a;
            background: #eff6ff;
        }

        /* Bubbles */
        .msg-row { display: flex; align-items: flex-end; gap: 0.5rem; }
        .msg-row.user { flex-direction: row-reverse; }

        .msg-icon {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; flex-shrink: 0; margin-bottom: 2px;
        }
        .msg-row.bot  .msg-icon { background: #eff6ff; color: #1e3a8a; }
        .msg-row.user .msg-icon { background: #f1f5f9; color: #64748b; }

        .msg-content { max-width: 72%; display: flex; flex-direction: column; gap: 3px; }
        .msg-row.user .msg-content { align-items: flex-end; }

        .bubble {
            padding: 0.65rem 0.9rem;
            border-radius: 16px;
            font-size: 0.88rem;
            line-height: 1.55;
            word-break: break-word;
        }

        .msg-row.bot  .bubble {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-bottom-left-radius: 4px;
            color: #1e293b;
        }

        .msg-row.user .bubble {
            background: #1e3a8a;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-time { font-size: 0.67rem; color: #cbd5e1; padding: 0 0.2rem; }

        /* Action badge */
        .action-badge {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.7rem; padding: 0.18rem 0.55rem;
            border-radius: 20px; margin-top: 0.3rem; font-weight: 500;
        }
        .action-badge.book, .action-badge.confirm_appointment { background: #dcfce7; color: #16a34a; }
        .action-badge.cancel     { background: #fee2e2; color: #dc2626; }
        .action-badge.reschedule { background: #fef9c3; color: #ca8a04; }
        .action-badge.rate       { background: #fef9c3; color: #ca8a04; }
        .action-badge.log_mood   { background: #ede9fe; color: #7c3aed; }
        .action-badge.join_waitlist { background: #e0f2fe; color: #0369a1; }
        .action-badge.crisis     { background: #fee2e2; color: #dc2626; }

        /* Typing */
        .typing-bubble {
            background: #f8fafc; border: 1px solid #f1f5f9;
            border-radius: 16px; border-bottom-left-radius: 4px;
            padding: 0.65rem 1rem;
            display: inline-flex; gap: 4px; align-items: center;
        }
        .typing-bubble span {
            width: 6px; height: 6px; background: #cbd5e1;
            border-radius: 50%; animation: tdot 1.2s ease-in-out infinite;
        }
        .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes tdot {
            0%,60%,100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        /* Input */
        .input-area {
            padding: 0.75rem 1.1rem 0.85rem;
            border-top: 1px solid #f1f5f9;
            flex-shrink: 0;
        }

        .input-row {
            display: flex; gap: 0.5rem; align-items: flex-end;
            background: #f8fafc; border: 1.5px solid #e2e8f0;
            border-radius: 14px; padding: 0.45rem 0.6rem 0.45rem 0.9rem;
            transition: border-color 0.2s;
        }
        .input-row:focus-within { border-color: #1e3a8a; }

        .chat-input {
            flex: 1; background: transparent;
            border: none; outline: none;
            color: #1e293b; font-size: 0.88rem;
            font-family: inherit; resize: none;
            max-height: 120px; min-height: 24px;
            line-height: 1.45; padding: 0.2rem 0;
        }
        .chat-input::placeholder { color: #94a3b8; }

        .send-btn {
            width: 34px; height: 34px; border-radius: 10px;
            border: none; background: #1e3a8a;
            color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background 0.2s;
        }
        .send-btn:hover:not(:disabled) { background: #1e40af; }
        .send-btn:disabled { opacity: 0.35; cursor: default; }

        /* Footer */
        .footer {
            text-align: center;
            padding: 0.5rem;
            font-size: 0.65rem;
            color: #cbd5e1;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="card">

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="bot-avatar">🤖</div>
            <div>
                <div class="header-title">AI Assistant</div>
                <div class="header-sub">Psychological support · KBTU</div>
            </div>
        </div>
        <div class="header-actions">
            <a class="voice-btn" id="voiceLink" href="/">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
                </svg>
                Voice
            </a>
            <button class="clear-btn" onclick="clearChat()" title="Очистить историю">🗑</button>
            <button class="close-btn" onclick="window.history.back()">✕</button>
        </div>
    </div>

    <!-- Messages -->
    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">🧠</div>
            <h3>How can I help you today?</h3>
            <p>Feel free to share what's on your mind.<br>Everything stays confidential.</p>
            <div class="suggestions">
                <button class="suggestion" onclick="quickSend(this)">I'm feeling stressed</button>
                <button class="suggestion" onclick="quickSend(this)">I can't sleep well</button>
                <button class="suggestion" onclick="quickSend(this)">Book an appointment</button>
                <button class="suggestion" onclick="quickSend(this)">My appointments</button>
            </div>
        </div>
    </div>

    <!-- Input -->
    <div class="input-area">
        <div class="input-row">
            <textarea
                id="chatInput"
                class="chat-input"
                placeholder="Type a message…"
                rows="1"
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="footer">Confidential &amp; AI Powered Support</div>
</div>

<script>
    const SESSION_ID = crypto.randomUUID();
    const AUTH_TOKEN = new URLSearchParams(location.search).get('token')
                    || localStorage.getItem('access_token') || '';

    document.getElementById('voiceLink').href = '/' + (AUTH_TOKEN ? '?token=' + encodeURIComponent(AUTH_TOKEN) : '');

    let isBusy = false;

    // Load chat history from server
    async function loadHistory() {
        if (!AUTH_TOKEN) return false;
        try {
            const res = await fetch('/api/history', {
                headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` }
            });
            if (!res.ok) return false;
            const data = await res.json();
            if (!data.messages || data.messages.length === 0) return false;
            document.getElementById('welcome')?.remove();
            data.messages.forEach(m => {
                if (m.role === 'user') addUserMsg(m.text);
                else addBotMsg(m.text, m.action);
            });
            return true;
        } catch (e) { return false; }
    }

    // Clear history
    async function clearChat() {
        if (!confirm('Очистить историю чата?')) return;
        if (AUTH_TOKEN) {
            await fetch('/api/history', {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` }
            });
        }
        document.getElementById('chatArea').innerHTML =
            `<div class="welcome" id="welcome">
                <div class="welcome-icon">🧠</div>
                <h3>How can I help you today?</h3>
                <p>Feel free to share what's on your mind.<br>Everything stays confidential.</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="quickSend(this)">I'm feeling stressed</button>
                    <button class="suggestion" onclick="quickSend(this)">I can't sleep well</button>
                    <button class="suggestion" onclick="quickSend(this)">Book an appointment</button>
                    <button class="suggestion" onclick="quickSend(this)">My appointments</button>
                </div>
            </div>`;
    }

    // Fetch profile and show personalized greeting
    async function initGreeting() {
        if (!AUTH_TOKEN) return;
        try {
            const res = await fetch('/api/me', {
                headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` }
            });
            if (!res.ok) return;
            const data = await res.json();
            const firstName = data.full_name ? data.full_name.split(' ')[0] : null;
            if (firstName) {
                const welcome = document.getElementById('welcome');
                if (welcome) {
                    welcome.querySelector('h3').textContent = `Привет, ${firstName}!`;
                }
                const greeting = `Привет, ${firstName}! 😊 Я здесь, чтобы поддержать тебя. Можешь рассказать, как ты себя чувствуешь, или я помогу записаться к специалисту.`;
                addBotMsg(greeting);
                // Tell LLM that greeting was already shown — don't repeat it
                fetch('/api/prime-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: SESSION_ID, greeting }),
                }).catch(() => {});
            }
        } catch (e) { /* silent fail */ }
    }

    // On load: show history OR personalized greeting
    loadHistory().then(hasHistory => {
        if (!hasHistory) initGreeting();
    });
    const chatArea  = document.getElementById('chatArea');
    const chatInput = document.getElementById('chatInput');
    const sendBtn   = document.getElementById('sendBtn');

    const ACTION_LABELS = {
        book:                '✅ Appointment booked',
        cancel:              '🚫 Appointment cancelled',
        reschedule:          '🔄 Rescheduled',
        confirm_appointment: '✅ Confirmed',
        rate:                '⭐ Session rated',
        log_mood:            '😊 Mood logged',
        join_waitlist:       '📋 Added to waitlist',
        crisis:              '🆘 Emergency contacts shared',
    };

    function ts() {
        return new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
    }

    function clearWelcome() { document.getElementById('welcome')?.remove(); }

    function esc(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    function addUserMsg(text) {
        clearWelcome();
        const row = document.createElement('div');
        row.className = 'msg-row user';
        row.innerHTML = `
            <div class="msg-icon">🧑</div>
            <div class="msg-content">
                <div class="bubble">${esc(text)}</div>
                <div class="msg-time">${ts()}</div>
            </div>`;
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addBotMsg(text, action) {
        clearWelcome();
        const row = document.createElement('div');
        row.className = 'msg-row bot';
        let badge = '';
        if (action && action !== 'none' && action !== 'collect_info' && ACTION_LABELS[action]) {
            badge = `<span class="action-badge ${action}">${ACTION_LABELS[action]}</span>`;
        }
        row.innerHTML = `
            <div class="msg-icon">🤖</div>
            <div class="msg-content">
                <div class="bubble">${esc(text)}${badge ? '<br>' + badge : ''}</div>
                <div class="msg-time">${ts()}</div>
            </div>`;
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        clearWelcome();
        const row = document.createElement('div');
        row.className = 'msg-row bot'; row.id = 'typing';
        row.innerHTML = `
            <div class="msg-icon">🤖</div>
            <div class="typing-bubble"><span></span><span></span><span></span></div>`;
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideTyping() { document.getElementById('typing')?.remove(); }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function quickSend(btn) { chatInput.value = btn.textContent; sendMessage(); }

    async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text || isBusy) return;
        chatInput.value = ''; chatInput.style.height = '';
        isBusy = true; sendBtn.disabled = true;

        addUserMsg(text);
        showTyping();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...(AUTH_TOKEN ? { 'Authorization': `Bearer ${AUTH_TOKEN}` } : {}),
                },
                body: JSON.stringify({ text, language: 'ru', session_id: SESSION_ID }),
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            hideTyping();
            addBotMsg(data.text_out, data.action);
        } catch (err) {
            hideTyping();
            addBotMsg('Something went wrong. Please try again.');
            console.error(err);
        } finally {
            isBusy = false; sendBtn.disabled = false; chatInput.focus();
        }
    }

    chatInput.focus();
</script>
</body>
</html>
